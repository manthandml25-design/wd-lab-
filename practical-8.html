<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    ```
    <!-- Title in browser tab -->
    <title>Creative Colorful Image Gallery</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1d2671, #c33764);
            color: white;
        }

        header {
            text-align: center;
            padding: 30px;
            font-size: 28px;
            letter-spacing: 2px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        /* Subtitle style */
        header p {
            font-size: 16px;
            margin-top: 10px;
            color: #f1f1f1;
            opacity: 0.8;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            padding: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            transition: 0.4s;
            border: 3px solid transparent;
        }

        .card:nth-child(1) {
            border-color: #ff6ec4;
        }

        .card:nth-child(2) {
            border-color: #7873f5;
        }

        .card:nth-child(3) {
            border-color: #42e695;
        }

        .card:nth-child(4) {
            border-color: #f7971e;
        }

        .card:nth-child(5) {
            border-color: #00c9ff;
        }

        .card:nth-child(6) {
            border-color: #ff758c;
        }

        .card:nth-child(7) {
            border-color: #43e97b;
        }

        .card:nth-child(8) {
            border-color: #fa709a;
        }

        .card:nth-child(9) {
            border-color: #30cfd0;
        }

        .card:nth-child(10) {
            border-color: #a18cd1;
        }

        .card:nth-child(11) {
            border-color: #fbc2eb;
        }

        .card:nth-child(12) {
            border-color: #84fab0;
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .title {
            padding: 12px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            letter-spacing: 1px;
        }

        .card:hover img {
            transform: scale(1.1);
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.5);
        }
    </style>
    ```

</head>

<body>

    <header>
        <h1>🌈 Creative Colorful Image Gallery</h1>
        <p>Explore beautiful scenes with vibrant colors and smooth hover effects</p>
    </header>

    <section class="gallery">
