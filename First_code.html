<!DOCTYPE html>
<html>

<head>
    <style>
        .highlight {
            color: orange;
        }

        .blue-text {
            color: #0000FF;
        }

        h1 {
            color: rgb(128, 0, 128);
        }
    </style>
</head>

<body>
    <p class="highlight">This is highlighted text.</p>
    <p class="blue-text">This is blue text.</p>
    <h1>Heading with custom color</h1>
</body>

</html>
